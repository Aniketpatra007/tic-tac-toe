<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>

    <main class="app">
      <header class="app-header">
        <h1>Tic-Tac-Toe Live</h1>
        <p>Play real-time with a friend using a room code.</p>
      </header>

      <section
        id="lobbySection"
        class="card panel active"
        aria-labelledby="lobbyTitle"
      >
        <h2 id="lobbyTitle">Create or Join a Room</h2>

        <div class="field-group">
          <label for="playerNameInput">Your Name</label>
          <input
            id="playerNameInput"
            type="text"
            maxlength="20"
            placeholder="Enter your name"
            autocomplete="name"
          />
        </div>

        <div class="actions-row">
          <button id="createRoomBtn" class="btn btn-primary">
            Create Room
          </button>
        </div>

        <div class="divider"><span>OR</span></div>

        <div class="field-group">
          <label for="roomIdInput">Room ID</label>
          <input
            id="roomIdInput"
            type="text"
            maxlength="8"
            placeholder="Enter room code"
            autocomplete="off"
          />
        </div>

        <div class="actions-row">
          <button id="joinRoomBtn" class="btn">Join Room</button>
        </div>

        <p
          id="lobbyMessage"
          class="message"
          role="status"
          aria-live="polite"
        ></p>
      </section>

      <section id="gameSection" class="card panel" aria-labelledby="gameTitle">
        <div class="game-topbar">
          <h2 id="gameTitle">Game Room</h2>
          <div class="room-meta">
            <span>Room:</span>
            <strong id="roomIdBadge">-</strong>
            <button id="copyRoomBtn" class="btn btn-small">Copy Link</button>
            <button id="leaveRoomBtn" class="btn btn-small btn-ghost">
              Leave
            </button>
          </div>
        </div>

        <div id="waitingOverlay" class="overlay active" aria-live="polite">
          <div class="overlay-card">
            <h3>Waiting for opponent...</h3>
            <p>Share the room link and ask them to join.</p>
          </div>
        </div>

        <div class="players-row">
          <div class="player-chip" id="playerXChip">
            <span class="token token-x">X</span>
            <div>
              <p class="chip-title" id="playerXName">Player X</p>
              <p class="chip-score">Wins: <span id="scoreX">0</span></p>
            </div>
          </div>

          <div class="player-chip" id="playerOChip">
            <span class="token token-o">O</span>
            <div>
              <p class="chip-title" id="playerOName">Player O</p>
              <p class="chip-score">Wins: <span id="scoreO">0</span></p>
            </div>
          </div>
        </div>

        <p id="turnText" class="turn-text" aria-live="polite">Turn: X</p>

        <section id="board" class="board" aria-label="Tic-Tac-Toe Board">
          <button class="cell" data-index="0" aria-label="Cell 1"></button>
          <button class="cell" data-index="1" aria-label="Cell 2"></button>
          <button class="cell" data-index="2" aria-label="Cell 3"></button>
          <button class="cell" data-index="3" aria-label="Cell 4"></button>
          <button class="cell" data-index="4" aria-label="Cell 5"></button>
          <button class="cell" data-index="5" aria-label="Cell 6"></button>
          <button class="cell" data-index="6" aria-label="Cell 7"></button>
          <button class="cell" data-index="7" aria-label="Cell 8"></button>
          <button class="cell" data-index="8" aria-label="Cell 9"></button>
        </section>

        <p
          id="resultText"
          class="result-text"
          role="status"
          aria-live="polite"
        ></p>

        <div class="actions-row">
          <button id="restartBtn" class="btn btn-primary">Restart Round</button>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
